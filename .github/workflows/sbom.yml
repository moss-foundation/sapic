name: Software Bill of Materials
on:
  workflow_dispatch:

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0
        with:
          fetch-depth: "0"

      - name: Set Up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: "package.json"

      - name: Install cdxgen (SBOM generator)
        run: |
          npm install -g @cyclonedx/cdxgen@11.11.0

      - name: Generate SBOM
        run: |
          cdxgen -r -o bom.json

      - name: Run vulnerability scanning with trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: "sbom"
          scan-ref: bom.json
          format: table
          output: trivy-sbom-report.txt
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: sbom
          path: bom.json

      - name: Upload Trivy SBOM report as artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: trivy-sbom-report
          path: trivy-sbom-report.txt

